<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AERWEP GİRİŞ EKRANI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            /* Sabit kurumsal mavi geçişli arka plan */
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #38bdf8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; 
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* MENÜNÜN ALTINDAN GEÇEN DEVASA UÇAK KANADI */
        .giant-airplane-bg {
            position: absolute;
            left: -10%;       
            bottom: -15%;     
            width: 170%;      
            max-width: 650px; 
            height: auto;
            opacity: 0.07;    /* Arka planda şık ve hafif gölge efekti */
            z-index: 1;       
            pointer-events: none;
            transform: rotate(30deg); 
        }

        /* Redmi Note 14 Pro ile uyumlu minimalist giriş kartı */
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 24px 20px;
            border-radius: 12px; 
            width: 85%;
            max-width: 280px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 2;
            position: relative;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 18px;
        }

        .logo-area h2 {
            font-size: 13.5px;
            font-weight: 700;
            color: #1e3a8a;
            letter-spacing: 0.5px;
        }

        .logo-area span {
            font-size: 9.5px;
            color: #64748b;
            display: block;
            margin-top: 3px; /* Slogan mesafesi için hafif boşluk */
        }

        .input-group {
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            color: #334155;
            font-size: 13px; 
            outline: none;
            transition: all 0.15s ease-in-out;
            -webkit-appearance: none; 
        }

        input:focus {
            border-color: #2563eb;
            background: #ffffff;
            box-shadow: 0 0 0 2px rgba(37, 99, 219, 0.15);
        }

        input::placeholder {
            color: #94a3b8;
            font-size: 11.5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #1e3a8a;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease;
            margin-top: 2px;
            -webkit-appearance: none;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:active {
            transform: scale(0.98); 
        }

        /* Her tıklandığında gelecek olan hata paneli */
        #error-box {
            background-color: #fff5f5;
            border: 1px solid #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 11px;
            margin-top: 12px;
            font-weight: 600;
            line-height: 1.4;
            display: none; /* İlk başta gizli */
            box-shadow: 0 2px 4px rgba(153, 27, 27, 0.05);
            animation: fadeIn 0.2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- Menünün arkasından geçen devasa uçak silüeti -->
<svg class="giant-airplane-bg" viewBox="0 0 24 24" fill="#ffffff">
    <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
</svg>

<div class="login-card">
    <div class="logo-area">
        <h2>AERWEP AIRLINES</h2>
        <span>Fly Beyond Every Cloud</span>
    </div>
    
    <form id="loginForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="Pilot ID /T.C. Kimlik Numarası" required autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Şifre" required>
        </div>
        <button type="submit">Sisteme Bağlan</button>
    </form>
    
    <!-- Başarısız ekranı uyarısı -->
    <div id="error-box">Kimlik doğrulama başarısız. </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const errorBox = document.getElementById('error-box');

    loginForm.addEventListener('submit', function(event) {
        event.preventDefault(); // Sayfanın yenilenmesini engeller
        
        // Inputları temizle
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';

        // Başarısız ekranı uyarısını görünür yap
        errorBox.style.display = 'block';
    });
</script>
    
</body>
</html>
